modelRoles:
  tiny: work-litellm/qwen-3.6-35b-sovereign
  smol: work-litellm/deepseek-v4-flash-sovereign
  commit: work-litellm/qwen-3.6-35b-sovereign
  default: work-litellm/qwen3-coder-480b
  task: work-litellm/qwen3-coder-480b
  plan: work-litellm/claude-sonnet-5*
  slow: work-litellm/claude-opus-4-8*
  vision: work-litellm/gemini-2.5-flash
  advisor: work-litellm/gpt-5-mini

enabledModels:
  - work-litellm/qwen-3.6-35b-sovereign
  - work-litellm/deepseek-v4-flash-sovereign
  - work-litellm/qwen3-coder-480b
  - work-litellm/claude-sonnet-5*
  - work-litellm/claude-opus-4-8*
  - work-litellm/gemini-2.5-flash
  - work-litellm/gpt-5-mini

cycleOrder:
  - smol
  - default
  - slow
  - plan

advisor:
  enabled: false
  subagents: false

retry:
  enabled: true
  maxRetries: 2
  baseDelayMs: 500
  maxDelayMs: 5000
  modelFallback: false
  fallbackChains: {}

tools:
  approvalMode: yolo
  approval:
    task: prompt
    browser: deny
    fetch: deny
    web_search: deny
  discoveryMode: off

browser:
  enabled: false

fetch:
  enabled: false

web_search:
  enabled: false

inspect_image:
  enabled: false

eval:
  py: false
  js: false

memory:
  backend: off

task:
  eager: default
  batch: false
  maxConcurrency: 1
  maxRecursionDepth: 0
  isolation:
    mode: none

compaction:
  enabled: true
  strategy: context-full
  thresholdPercent: 80
  reserveTokens: 16384
  keepRecentTokens: 20000
  remoteEnabled: false
  remoteStreamingV2Enabled: false
