modelRoles:
  tiny: openai-codex/gpt-5.6-luna:low
  smol: openai-codex/gpt-5.6-luna:low
  commit: openai-codex/gpt-5.6-luna:low
  default: openai-codex/gpt-5.6-terra:medium
  task: openai-codex/gpt-5.6-terra:medium
  plan: openai-codex/gpt-5.6-sol:high
  slow: openai-codex/gpt-5.6-sol:high
  advisor: openai-codex/gpt-5.6-terra:medium

enabledModels:
  - openai-codex/gpt-5.6-luna
  - openai-codex/gpt-5.6-terra
  - openai-codex/gpt-5.6-sol

cycleOrder:
  - smol
  - default
  - slow
  - plan

advisor:
  enabled: false
  subagents: false

retry:
  enabled: true
  maxRetries: 2
  baseDelayMs: 500
  maxDelayMs: 5000
  modelFallback: false
  fallbackChains: {}

tools:
  approvalMode: yolo
  approval:
    task: prompt
    browser: deny
    fetch: deny
    web_search: deny
  discoveryMode: off

browser:
  enabled: false

fetch:
  enabled: false

web_search:
  enabled: false

inspect_image:
  enabled: false

eval:
  py: false
  js: false

memory:
  backend: off

task:
  eager: default
  batch: false
  maxConcurrency: 1
  maxRecursionDepth: 0
  isolation:
    mode: none

compaction:
  enabled: true
  strategy: context-full
  thresholdPercent: 80
  reserveTokens: 16384
  keepRecentTokens: 20000
  remoteEnabled: false
  remoteStreamingV2Enabled: false
